      useEffect(() => {

      }, [settings.pomodoroWorkTime, settings.pomodoroBreakTime, mode, isActive]);

      useEffect(() => {
        let interval;
        if (isActive && timeLeft > 0) {
          interval = setInterval(() => setTimeLeft(p => p - 1), 1000);
        } else if (timeLeft === 0) {
          setIsActive(false);
          setMode(mode === 'work' ? 'break' : 'work');
        }
        return () => clearInterval(interval);
      }, [isActive, timeLeft, mode]);

    // ─── NEWS SLIDESHOW ────────────────────────────────────────────────────────
    const NewsSlideshow = ({ feeds, settings, t, onHeightChange }) => {
      const [news, setNews] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [loading, setLoading] = useState(true);
      const [isSpeaking, setIsSpeaking] = useState(false);
      const [isHovering, setIsHovering] = useState(false);
      const [activeOverlay, setActiveOverlay] = useState(null);
      const [aiLoading, setAiLoading] = useState(false);
      const timerRef = useRef(null);

      useEffect(()=>{
        const fetchNews = async () => {
          setLoading(true);
          const allNews = [];
          const enabledFeeds = feeds.filter(f=>f.enabled);
          if (!enabledFeeds.length) { setNews([]); setLoading(false); return; }
          const promises = enabledFeeds.map(feed =>
            fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feed.url)}`)
              .then(r=>r.json()).then(data=>{
                if (data.status==='ok') return data.items.slice(0,10).map(item=>({
                  title:item.title, link:item.link, source:feed.name, pubDate:item.pubDate,
                  contentSnippet:(item.description||'').replace(/<[^>]*>/g,'').slice(0,300)+'...',
                  thumbnail:item.enclosure?.link||item.thumbnail
                }));
                return [];
              }).catch(()=>[])
          );
          const results = await Promise.all(promises);
          results.forEach(items=>allNews.push(...items));
          allNews.sort((a,b)=>new Date(b.pubDate)-new Date(a.pubDate));
          setNews(allNews.slice(0,40));
          setLoading(false);
        };
        fetchNews();
      },[feeds]);

      useEffect(()=>{
        if (settings.newsAutoScroll&&news.length>0&&!isSpeaking&&!isHovering&&!activeOverlay) {
          if (timerRef.current) clearInterval(timerRef.current);
          timerRef.current = setInterval(()=>setCurrentIndex(p=>(p+1)%news.length), settings.newsSpeed*1000);
        } else { if(timerRef.current) clearInterval(timerRef.current); }
        return ()=>{ if(timerRef.current) clearInterval(timerRef.current); };
      },[settings.newsAutoScroll,settings.newsSpeed,news,isSpeaking,isHovering,activeOverlay]);

      if (!settings.showNews) return null;
      const heightStyle = { height:`${4*settings.newsHeightMultiplier}rem` };
      const dateLocale = settings.language==='en'?'en-US':settings.language==='es'?'es-ES':'zh-CN';

      return (

    // ─── VOICE ASSISTANT (simplified) ─────────────────────────────────────────
    const VoiceAssistant = ({ settings }) => {
      const [mode, setMode] = useState('idle');

      useEffect(()=>{
        if(settings?.weatherEnabled&&settings.weatherLat) fetchWeather();
      },[settings?.weatherLat,settings?.weatherLon]);

      const fetchWeather = async()=>{
        try {
          const url=`https://api.open-meteo.com/v1/forecast?latitude=${settings.weatherLat}&longitude=${settings.weatherLon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m&daily=temperature_2m_max,temperature_2m_min&timezone=auto`;
          const res=await fetch(url); const data=await res.json();
          setWeather({current:{temp:Math.round(data.current.temperature_2m),wind:Math.round(data.current.wind_speed_10m),humidity:data.current.relative_humidity_2m},tomorrow:{max:Math.round(data.daily.temperature_2m_max[1]),min:Math.round(data.daily.temperature_2m_min[1])}});
        } catch(e){}
      };

      const handleChat = async()=>{
        if(!textInput.trim())return;
        setIsProcessing(true);
        try {
          const apiKey=settings.geminiApiKey||'';
          if(!apiKey){setTextResponse('Configura tu Gemini API Key en Ajustes.');setIsProcessing(false);return;}
          const ai=new GoogleGenAI({apiKey});
          const result=await ai.models.generateContent({model:'gemini-2.0-flash',contents:`Be brief. Reply in ${settings.language==='es'?'Spanish':'English'}. User: ${textInput}`});
          setTextResponse(result.text||'');

            <div className="bg-slate-900/60 border border-white/10 rounded-2xl p-4 flex items-center gap-6 backdrop-blur-md group hover:border-cyan-500/50 transition-all">

                <span className="text-[10px] text-cyan-400 font-bold uppercase tracking-tighter mb-1">{settings.weatherCity}</span>

              </div>
            </div>
          )}
          <div className="flex-1 flex gap-4">
            <button onClick={()=>setMode(m=>m==='wechat_text'?'idle':'wechat_text')}
              className="flex-1 group relative px-6 py-4 bg-slate-900 border border-emerald-500/30 rounded-2xl flex items-center gap-3 overflow-hidden transition-all hover:border-emerald-400 active:scale-95 select-none">

                {activeTab==='layout'&&(
                  <div className="space-y-6 animate-fade-in">
                    <h3 className="text-lg font-bold text-white border-b border-white/10 pb-2 flex items-center gap-2"><Layout size={18} className="text-cyan-400"/>{t.reorderModules}</h3>
                    <div className="space-y-2">
                      {ls.categoryOrder.map((key,index)=>(
                        <div key={key} className="bg-slate-800/80 border border-white/5 rounded-xl p-3 flex items-center justify-between group hover:border-cyan-500/30 transition-all">
                          <div className="flex items-center gap-3"><div className="p-2 bg-slate-900 rounded-lg text-slate-600 group-hover:text-cyan-500 transition-colors"><GripVertical size={20}/></div><span className="text-sm font-bold text-slate-200">{getCategoryLabel(key)}</span></div>
                          <div className="flex items-center gap-1">
                            <button disabled={index===0} onClick={()=>moveCategory(index,'up')} className="p-2 bg-slate-900 rounded-lg text-slate-400 hover:text-white hover:bg-cyan-600 disabled:opacity-20 transition-all"><ChevronUp size={18}/></button>
                            <button disabled={index===ls.categoryOrder.length-1} onClick={()=>moveCategory(index,'down')} className="p-2 bg-slate-900 rounded-lg text-slate-400 hover:text-white hover:bg-cyan-600 disabled:opacity-20 transition-all"><ChevronDown size={18}/></button>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                )}
                {activeTab==='weather'&&(
                  <div className="space-y-6 animate-fade-in">
                    <h3 className="text-lg font-bold text-white flex items-center gap-2"><CloudSun size={18}/> Atmosphere Control</h3>
                    <div className="space-y-4 bg-slate-800/30 p-4 rounded-xl border border-white/5">
                      <div className="flex gap-2">
                        <input type="text" value={ls.weatherCity} onChange={e=>hc('weatherCity',e.target.value)} className="flex-1 bg-slate-800 border border-slate-700 rounded-lg p-3 text-sm text-white focus:border-cyan-500 outline-none" placeholder="Escribe ciudad..."/>
                        <button onClick={lookupCity} disabled={geoLoading} className="bg-cyan-600 hover:bg-cyan-500 text-white px-4 rounded-lg disabled:opacity-50">{geoLoading?<RotateCcw size={20} className="animate-spin"/>:<MapPin size={20}/>}</button>
                      </div>
                      {geoResults.length>0&&(
                        <div className="space-y-1 bg-slate-900 border border-slate-700 rounded-lg p-2 max-h-40 overflow-y-auto">
                          {geoResults.map(city=>(
                            <button key={`${city.latitude}-${city.longitude}`} onClick={()=>{hc('weatherCity',city.name);hc('weatherLat',city.latitude);hc('weatherLon',city.longitude);setGeoResults([]);}} className="w-full text-left p-2 hover:bg-cyan-900/40 text-xs text-slate-300 rounded">
                              {city.name}, {city.country} — {city.latitude.toFixed(2)}, {city.longitude.toFixed(2)}
                            </button>
                          ))}
                        </div>
                      )}
                      <div className="flex items-center justify-between"><span className="text-sm text-slate-300">Clima activado</span><input type="checkbox" checked={ls.weatherEnabled} onChange={e=>hc('weatherEnabled',e.target.checked)} className="accent-cyan-400 w-5 h-5"/></div>
                    </div>
                  </div>
                )}
                {activeTab==='keys'&&(
                  <div className="space-y-6 animate-fade-in">
                    <h3 className="text-lg font-bold text-white border-b border-white/10 pb-2 flex items-center gap-2"><Zap size={18}/> API Keys</h3>
                    <div className="space-y-4 bg-slate-800/30 p-4 rounded-xl border border-white/5">
                      <div>
                        <label className="text-[10px] text-slate-500 uppercase font-bold">Gemini API Key</label>
                        <input type="password" value={ls.geminiApiKey} onChange={e=>hc('geminiApiKey',e.target.value)} className="w-full mt-1 bg-slate-900 border border-slate-700 rounded-lg p-3 text-sm text-white focus:border-cyan-500 outline-none" placeholder="AIza..."/>
                        <p className="text-[10px] text-slate-500 mt-1">Necesaria para Chat IA, News AI, Asistente de voz y Podcast.</p>
                      </div>
                    </div>
                  </div>
                )}
                {activeTab==='rss'&&(
                  <div className="space-y-6 animate-fade-in">
                    <h3 className="text-lg font-bold text-white flex items-center gap-2">Canales RSS</h3>
                    <div className="bg-slate-800/30 p-4 rounded-xl border border-white/5 space-y-4">
                      <div className="grid grid-cols-2 gap-2">
                        <input type="text" placeholder="Nombre Canal" value={newFeedName} onChange={e=>setNewFeedName(e.target.value)} className="bg-slate-900 border border-slate-700 rounded p-2 text-xs outline-none focus:border-cyan-500 text-white"/>
                        <input type="text" placeholder="URL RSS" value={newFeedUrl} onChange={e=>setNewFeedUrl(e.target.value)} className="bg-slate-900 border border-slate-700 rounded p-2 text-xs outline-none focus:border-cyan-500 text-white"/>
                        <button onClick={()=>{if(!newFeedUrl)return;setLf(p=>[...p,{id:Date.now().toString(),name:newFeedName||'Feed',url:newFeedUrl,enabled:true}]);setNewFeedName('');setNewFeedUrl('');}} className="col-span-2 bg-cyan-600 hover:bg-cyan-500 py-2 rounded text-xs font-bold flex items-center justify-center gap-2 text-white"><Plus size={14}/>Añadir Fuente</button>
                      </div>
                      <div className="space-y-2 max-h-60 overflow-y-auto pr-2 custom-scrollbar">
                        {lf.map(feed=>(
                          <div key={feed.id} className="flex items-center justify-between bg-slate-900/50 p-2 rounded border border-white/5">
                            <div className="flex flex-col"><span className="text-xs font-bold text-white">{feed.name}</span><span className="text-[10px] text-slate-500 truncate max-w-[200px]">{feed.url}</span></div>
                            <div className="flex items-center gap-2">
                              <input type="checkbox" checked={feed.enabled} onChange={e=>setLf(p=>p.map(f=>f.id===feed.id?{...f,enabled:e.target.checked}:f))} className="accent-cyan-400"/>
                              <button onClick={()=>setLf(p=>p.filter(f=>f.id!==feed.id))} className="text-red-400 hover:text-red-300"><Trash2 size={14}/></button>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                )}
                {activeTab==='guide'&&(
                  <div className="space-y-6 animate-fade-in">
                    <h3 className="text-lg font-bold text-white border-b border-white/10 pb-2 flex items-center gap-2"><BookOpen size={18}/>Manual de Supervivencia</h3>
                    <div className="space-y-4 text-xs text-slate-300 leading-relaxed">
                      <div className="p-3 bg-slate-800 rounded border-l-2 border-cyan-500"><strong>Instalación PWA:</strong> Haz clic en el botón flotante "Instalar NEXUS HUB" para añadir la app a tu dispositivo. En iOS usa Safari → Compartir → "Agregar a pantalla de inicio".</div>
                      <div className="p-3 bg-slate-800 rounded border-l-2 border-fuchsia-500"><strong>API Key:</strong> Ve a Ajustes → API Keys y pega tu Gemini API Key para activar funciones de IA (chat, noticias IA, etc.).</div>
                      <div className="p-3 bg-slate-800 rounded border-l-2 border-emerald-500"><strong>Edición:</strong> Activa el lápiz en la cabecera para reordenar y editar módulos.</div>
                      <div className="p-3 bg-slate-800 rounded border-l-2 border-yellow-500"><strong>Módulos:</strong> Usa el botón "+" para añadir nuevos accesos directos. Personaliza tema, tamaño y categoría.</div>
                    </div>
                  </div>
                )}
                {activeTab==='data'&&(
                  <div className="space-y-6 animate-fade-in">
                    <h3 className="text-lg font-bold text-white border-b border-white/10 pb-2 flex items-center gap-2"><Database size={18}/>Almacenamiento y Emergencia</h3>
                    <div className="grid gap-4">
                      <div className="p-4 bg-slate-800/30 rounded-xl border border-white/5 space-y-4">
                        <h4 className="text-xs font-bold uppercase text-slate-500">Migración</h4>
                        <div className="grid grid-cols-2 gap-4">
                          <button onClick={()=>{
                            const data={settings:ls,buttons:lb,feeds:lf};
                            const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
                            const url=URL.createObjectURL(blob);
                            const a=document.createElement('a');
                            a.href=url;
                            a.download='nexus_hub_backup.json';
                            document.body.appendChild(a);
                            a.click();
                            document.body.removeChild(a);
                            URL.revokeObjectURL(url);
                          }} className="p-3 bg-slate-800 border border-slate-700 rounded-lg hover:bg-cyan-900/40 hover:border-cyan-500/50 text-xs font-bold text-white flex items-center justify-center gap-2 transition-colors">
                            <Download size={14}/>Exportar Todo
                          </button>
                          <button onClick={()=>{
                            const input=document.createElement('input');
                            input.type='file';
                            input.accept='.json';
                            input.onchange=(e)=>{
                              const file=e.target.files[0];
                              if(!file)return;
                              const reader=new FileReader();
                              reader.onload=(re)=>{
                                try{
                                  const data=JSON.parse(re.target.result);
                                  if(data.settings) setLs(p=>({...INITIAL_SETTINGS,...p,...data.settings}));
                                  if(data.feeds) setLf(data.feeds);
                                  if(data.buttons && Array.isArray(data.buttons)){
                                    setLb(data.buttons);
                                    onSaveButtons(data.buttons);
                                  }
                                  alert('✅ Backup cargado. Pulsa GUARDAR CAMBIOS para aplicar settings y feeds.');
                                }catch(err){
                                  alert('❌ Error al importar: archivo JSON inválido.');
                                }
                              };
                              reader.readAsText(file);
                            };
                            input.click();
                          }} className="p-3 bg-slate-800 border border-slate-700 rounded-lg hover:bg-fuchsia-900/40 hover:border-fuchsia-500/50 text-xs font-bold text-white flex items-center justify-center gap-2 transition-colors">
                            <FileText size={14}/>Importar Todo
                          </button>
                        </div>
                      </div>
                      <div className="p-4 bg-red-900/10 rounded-xl border border-red-500/30 space-y-4">
                        <h4 className="text-xs font-bold uppercase text-red-500 flex items-center gap-2"><Zap size={14}/>Protocolo de Emergencia</h4>
                        <p className="text-[10px] text-slate-400">Esta acción borrará TODOS los datos. IRREVERSIBLE.</p>
                        <button onClick={onResetAll} className="w-full p-4 bg-red-600 hover:bg-red-500 text-white rounded-xl font-bold flex items-center justify-center gap-3 transition-all active:scale-95"><RotateCcw size={20}/>REINICIO DE FÁBRICA</button>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </div>
            <div className="p-4 border-t border-slate-800 bg-slate-900 flex justify-end gap-3">
              <button onClick={onClose} className="px-4 py-2 text-slate-400 hover:text-white font-bold text-xs uppercase tracking-widest">CERRAR</button>
              <button onClick={handleSave} className="px-8 py-3 bg-gradient-to-r from-cyan-600 to-blue-600 text-white rounded-xl font-bold shadow-lg hover:shadow-cyan-500/20 flex items-center gap-2 group">
                <Save size={18} className="group-hover:scale-110 transition-transform"/>GUARDAR CAMBIOS
              </button>
            </div>
          </div>
        </div>
      );
    };

    // ─── MAIN APP ─────────────────────────────────────────────────────────────
    const App = () => {
      const [settings, setSettings] = useState(()=>{ const s=loadFromStorage('nexus_settings',null); return s?{...INITIAL_SETTINGS,...s}:INITIAL_SETTINGS; });
      const [buttons, setButtons] = useState(()=>loadFromStorage('nexus_buttons',INITIAL_BUTTONS));
      const [feeds, setFeeds] = useState(()=>loadFromStorage('nexus_feeds',INITIAL_RSS_FEEDS));
      const [isSettingsOpen, setIsSettingsOpen] = useState(false);
      const [isChatOpen, setIsChatOpen] = useState(false);
      const [isPomodoroOpen, setIsPomodoroOpen] = useState(false);
      const [isOrganizerOpen, setIsOrganizerOpen] = useState(false);
      const [isEditingButtons, setIsEditingButtons] = useState(false);
      const [searchTerm, setSearchTerm] = useState('');
      const [isShocking, setIsShocking] = useState(false);
      const [editingButtonId, setEditingButtonId] = useState(null);
      const [editForm, setEditForm] = useState({});
      const [pickingCategoryFor, setPickingCategoryFor] = useState(null);

      useEffect(()=>{ saveToStorage('nexus_settings',settings); },[settings]);
      useEffect(()=>{ saveToStorage('nexus_buttons',buttons); },[buttons]);
      useEffect(()=>{ saveToStorage('nexus_feeds',feeds); },[feeds]);

      const t = TRANSLATIONS[settings.language] || TRANSLATIONS.es;
      const getCategoryName = cat => CATEGORY_TRANSLATIONS[cat]?.[settings.language]||cat;

      const handleResetAll = () => {
        if (confirm("¿ESTÁS SEGURO? Se borrarán todos tus botones y ajustes.")) { localStorage.clear(); window.location.reload(); }
      };

      const filteredButtons = buttons.filter(b => b.title.toLowerCase().includes(searchTerm.toLowerCase())||b.category.toLowerCase().includes(searchTerm.toLowerCase()));

      const getGroupedButtons = () => ({
        pinned: filteredButtons.filter(b=>b.pinned),
        social: filteredButtons.filter(b=>b.socialNetwork&&b.socialNetwork!=='none'&&!b.pinned),
        business: filteredButtons.filter(b=>b.category==='Business'&&!b.pinned),
        web_tools: filteredButtons.filter(b=>b.category==='Web Tools'&&!b.pinned),
        ai_models: filteredButtons.filter(b=>b.category==='AI Models'&&!b.pinned),
        dev: filteredButtons.filter(b=>b.category==='Development'&&!b.pinned),
        more_ia: filteredButtons.filter(b=>b.category==='More IA Tools'&&!b.pinned),
        general: filteredButtons.filter(b=>!b.pinned&&(!b.socialNetwork||b.socialNetwork==='none')&&!['Business','Web Tools','AI Models','Development','More IA Tools'].includes(b.category)),
      });

      const handleAddButton = () => {
        const nb = {id:Date.now().toString(),title:'Nuevo Módulo',url:'https://',category:'General',theme:'neon-blue',size:'standard',pinned:false,indicatorColor:'#00f0ff',subButtons:[]};
        setButtons(p=>[...p,nb]); setEditingButtonId(nb.id); setEditForm(nb); setIsEditingButtons(true);
      };

      const saveEditedButton = () => {
        if (!editingButtonId) return;
        setButtons(p=>p.map(b=>b.id===editingButtonId?{...b,...editForm}:b));
        setEditingButtonId(null); setEditForm({});
      };

      const toggleSafeMode = () => {
        if (settings.safeMode) { setIsShocking(true); setTimeout(()=>{setIsShocking(false);setSettings(p=>({...p,safeMode:false,lowPowerMode:false}));},800); }
        else setSettings(p=>({...p,safeMode:true,lowPowerMode:true}));
      };

      const SECTION_CONFIG = {
        pinned: {title:t.pinned,icon:<Pin size={24}/>,color:'yellow'},
        social: {title:t.socials,icon:<Share2 size={24}/>,color:'pink'},
        business: {title:t.business,icon:<Briefcase size={24}/>,color:'emerald'},
        web_tools: {title:t.webTools,icon:<Globe size={24}/>,color:'blue'},
        ai_models: {title:getCategoryName('AI Models'),icon:<Layers size={24}/>,color:'cyan'},
        dev: {title:getCategoryName('Development'),icon:<Layers size={24}/>,color:'slate'},
        more_ia: {title:getCategoryName('More IA Tools'),icon:<Sparkles size={24}/>,color:'indigo'},
        general: {title:t.general,icon:<Grid size={24}/>,color:'cyan'},
      };

      const renderSection = (key) => {
        const subsets = getGroupedButtons();
        const list = subsets[key];
        if (!list||list.length===0&&!isEditingButtons) return null;
        const cfg = SECTION_CONFIG[key]||{title:key,icon:null,color:'slate'};
        return (
          <section key={key} className="animate-fade-in-up">
            <div className={`flex items-center gap-4 mb-6 border-b pb-2 ${settings.darkMode?`border-${cfg.color}-500/30`:`border-${cfg.color}-200`}`}>
              <div className={`p-2 rounded-lg border ${settings.darkMode?`bg-${cfg.color}-900/30 border-${cfg.color}-500/30 text-${cfg.color}-400`:`bg-${cfg.color}-100 border-${cfg.color}-200 text-${cfg.color}-600`}`}>{cfg.icon}</div>
              <h2 className={`text-2xl font-display font-bold tracking-wide ${settings.darkMode?`text-${cfg.color}-100`:`text-${cfg.color}-800`}`}>{cfg.title}</h2>
            </div>
            <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6 grid-flow-dense">
              {list.map(btn=>(
                <FuturisticButton key={btn.id} button={btn} settings={settings} isEditing={isEditingButtons}
                  onEdit={b=>{setEditingButtonId(b.id);setEditForm(b);}}
                  onDelete={id=>setButtons(p=>p.filter(b=>b.id!==id))}
                  onTogglePin={id=>setButtons(p=>p.map(b=>b.id===id?{...b,pinned:!b.pinned}:b))}
                  onChangeCategory={b=>setPickingCategoryFor(b.id)}
                  onDragStart={()=>{}} onDrop={()=>{}}
                  onOpenFolder={b=>{}}
                  onMove={(id,dir)=>{
                    setButtons(p=>{
                      const idx=p.findIndex(b=>b.id===id); const arr=[...p];
                      const ti=dir==='up'||dir==='left'?idx-1:idx+1;
                      if(ti>=0&&ti<arr.length)[arr[idx],arr[ti]]=[arr[ti],arr[idx]];
                      return arr;
                    });
                  }}
                />
              ))}
            </div>
          </section>
        );
      };

      return (
        <div className={`min-h-screen flex flex-col font-sans transition-all duration-500 overflow-x-hidden ${settings.darkMode?'bg-slate-900 text-white':'bg-slate-100 text-slate-900'} ${isShocking?'animate-pulse':''}`}>

          {/* HEADER */}
          <header className={`sticky top-0 z-40 backdrop-blur-md border-b transition-all ${settings.darkMode?'bg-slate-900/80 border-white/5 shadow-lg':'bg-white/80 border-slate-200 shadow-md'}`}>
            <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between gap-4">
              <div className="flex items-center gap-4">
                <button onClick={()=>setIsSettingsOpen(true)} className="p-2 rounded-lg bg-slate-800 text-cyan-400 hover:bg-slate-700 transition-colors"><Menu size={24}/></button>
                <Logo safeMode={settings.safeMode}/>
              </div>
              <div className="flex-1 max-w-xs hidden md:block">
                <div className="relative"><Search size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"/><input type="text" value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} placeholder={t.search} className="w-full pl-9 pr-4 py-2 bg-slate-800 border border-slate-700 rounded-full text-sm text-white focus:border-cyan-500 outline-none"/></div>
              </div>
              <div className="flex items-center gap-2">
                <button onClick={toggleSafeMode} className={`p-2 rounded-full transition-all ${settings.safeMode?'bg-white text-cyan-500':'bg-slate-800 text-cyan-400'}`}><ShieldCheck size={20}/></button>
                <button onClick={()=>setSettings(p=>({...p,darkMode:!p.darkMode}))} className="p-2 text-slate-300 hover:text-yellow-400 transition-colors"><Sun size={20}/></button>
                <button onClick={()=>setIsPomodoroOpen(!isPomodoroOpen)} className="p-2 text-slate-400 hover:text-white transition-colors"><Timer size={20}/></button>
                <button onClick={()=>setIsOrganizerOpen(true)} className="p-2 text-slate-400 hover:text-white transition-colors"><Calendar size={20}/></button>
                <button onClick={()=>setIsChatOpen(true)} className="p-2 text-slate-400 hover:text-fuchsia-400 transition-colors"><MessageCircle size={20}/></button>
                <button onClick={()=>setIsEditingButtons(!isEditingButtons)} className={`p-2 rounded-lg ${isEditingButtons?'bg-yellow-500/20 text-yellow-500':'text-slate-400 hover:text-white'}`}><Edit2 size={20}/></button>
              </div>
            </div>
          </header>

          <main className="flex-1 max-w-7xl mx-auto w-full p-6 space-y-12 pb-32">
            {!settings.safeMode && <VoiceAssistant settings={settings}/>}
            {!settings.safeMode && <NewsSlideshow feeds={feeds} settings={settings} t={t} onHeightChange={val=>setSettings(p=>({...p,newsHeightMultiplier:val}))}/>}

            {isEditingButtons && (
              <div className="sticky top-20 z-30 mb-8 flex flex-wrap justify-center gap-4 p-4 bg-slate-900/90 backdrop-blur rounded-2xl border border-white/10 shadow-2xl">
                <button onClick={handleAddButton} className="bg-cyan-600 hover:bg-cyan-500 px-8 py-3 rounded-full text-white font-bold flex items-center gap-2"><Plus size={20}/>{t.addButton}</button>
                <button onClick={()=>setIsEditingButtons(false)} className="bg-green-600 hover:bg-green-500 px-8 py-3 rounded-full text-white font-bold flex items-center gap-2"><Check size={20}/>{t.save}</button>
              </div>
            )}

            {/* Edit form */}
            {editingButtonId && (
              <div className="fixed inset-0 z-[200] flex items-center justify-center bg-black/70 backdrop-blur-sm animate-fade-in">
                <div className="bg-slate-900 border border-cyan-500/50 w-full max-w-md rounded-2xl p-6 shadow-2xl">
                  <h3 className="text-xl font-display font-bold text-cyan-400 mb-4">Editar Módulo</h3>
                  <div className="space-y-4">
                    <div><label className="text-xs text-slate-400 uppercase">Nombre</label><input value={editForm.title||''} onChange={e=>setEditForm(p=>({...p,title:e.target.value}))} className="w-full mt-1 bg-slate-800 border border-slate-700 rounded p-2 text-white focus:border-cyan-500 outline-none"/></div>
                    <div><label className="text-xs text-slate-400 uppercase">URL</label><input value={editForm.url||''} onChange={e=>setEditForm(p=>({...p,url:e.target.value}))} className="w-full mt-1 bg-slate-800 border border-slate-700 rounded p-2 text-white focus:border-cyan-500 outline-none"/></div>
                    <div><label className="text-xs text-slate-400 uppercase">Categoría</label>
                      <select value={editForm.category||'General'} onChange={e=>setEditForm(p=>({...p,category:e.target.value}))} className="w-full mt-1 bg-slate-800 border border-slate-700 rounded p-2 text-white outline-none">
                        {['AI Models','Development','General','Business','Web Tools','More IA Tools','Social'].map(c=><option key={c} value={c}>{c}</option>)}
                      </select>
                    </div>
                    <div><label className="text-xs text-slate-400 uppercase">Tema Visual</label>
                      <select value={editForm.theme||'neon-blue'} onChange={e=>setEditForm(p=>({...p,theme:e.target.value}))} className="w-full mt-1 bg-slate-800 border border-slate-700 rounded p-2 text-white outline-none">
                        {Object.keys(BUTTON_THEMES).map(th=><option key={th} value={th}>{th}</option>)}
                      </select>
                    </div>
                    <div><label className="text-xs text-slate-400 uppercase">Tamaño</label>
                      <select value={editForm.size||'standard'} onChange={e=>setEditForm(p=>({...p,size:e.target.value}))} className="w-full mt-1 bg-slate-800 border border-slate-700 rounded p-2 text-white outline-none">
                        <option value="small">Small</option><option value="standard">Standard</option><option value="wide">Wide</option><option value="large">Large</option>
                      </select>
                    </div>
                    <div><label className="text-xs text-slate-400 uppercase">Color Indicador</label><input type="color" value={editForm.indicatorColor||'#00f0ff'} onChange={e=>setEditForm(p=>({...p,indicatorColor:e.target.value}))} className="w-full mt-1 h-10 rounded cursor-pointer"/></div>
                  </div>
                  <div className="flex gap-3 mt-6">
                    <button onClick={()=>{setEditingButtonId(null);setEditForm({});}} className="flex-1 py-3 border border-slate-700 rounded-xl text-slate-300 hover:bg-slate-800 font-bold">Cancelar</button>
                    <button onClick={saveEditedButton} className="flex-1 py-3 bg-gradient-to-r from-cyan-600 to-blue-600 text-white rounded-xl font-bold">Guardar</button>
                  </div>
                </div>
              </div>
            )}

            {/* Category picker */}
            {pickingCategoryFor && (
              <div className="fixed inset-0 z-[200] flex items-center justify-center bg-black/70 backdrop-blur-sm animate-fade-in" onClick={()=>setPickingCategoryFor(null)}>
                <div className="bg-slate-900 border border-fuchsia-500/50 w-full max-w-xs rounded-2xl p-6 shadow-2xl" onClick={e=>e.stopPropagation()}>
                  <h3 className="text-xl font-display font-bold text-fuchsia-400 mb-4">Cambiar Categoría</h3>
                  <div className="space-y-2">
                    {['AI Models','Development','General','Business','Web Tools','More IA Tools','Social'].map(cat=>(
                      <button key={cat} onClick={()=>{setButtons(p=>p.map(b=>b.id===pickingCategoryFor?{...b,category:cat}:b));setPickingCategoryFor(null);}} className="w-full text-left p-3 bg-slate-800 hover:bg-fuchsia-900/30 rounded-lg text-sm text-slate-200 hover:text-fuchsia-400 transition-colors">{cat}</button>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {(settings.categoryOrder||INITIAL_SETTINGS.categoryOrder).map(catKey => renderSection(catKey))}
          </main>

          {/* Pomodoro */}
          <div className="relative">
            <Pomodoro settings={settings} t={t} isOpen={isPomodoroOpen} onClose={()=>setIsPomodoroOpen(false)}/>
          </div>

          {/* Modals */}
          <GeminiChat settings={settings} t={t} isOpen={isChatOpen} onClose={()=>setIsChatOpen(false)}/>
          <SettingsModal isOpen={isSettingsOpen} onClose={()=>setIsSettingsOpen(false)} settings={settings} onSaveSettings={setSettings} feeds={feeds} onSaveFeeds={setFeeds} buttons={buttons} onSaveButtons={setButtons} t={t} onResetAll={handleResetAll}/>
          <Organizer isOpen={isOrganizerOpen} onClose={()=>setIsOrganizerOpen(false)} settings={settings} t={t}/>
        </div>
      );
    };

    // ─── MOUNT ────────────────────────────────────────────────────────────────
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<React.StrictMode><App/></React.StrictMode>);
  </script>

  <!-- PWA & Service Worker Logic -->
  <script>
    // ── Service Worker registration ──────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/Nexus-ALL-HUB/sw.js', { scope: '/Nexus-ALL-HUB/' })
          .then(reg => {
            console.log('[SW] Registered OK, scope:', reg.scope);
          })
          .catch(err => console.error('[SW] Registration failed:', err));
      });
    }

    // ── Install button logic ──────────────────────────────────────────────────
    let deferredPrompt = null;
    const installBtn  = document.getElementById('pwa-install-btn');
    const iosBanner   = document.getElementById('pwa-banner');
    const iosBannerClose = document.getElementById('pwa-banner-close');

    // Check if already installed as standalone
    const isInstalled = window.matchMedia('(display-mode: standalone)').matches
      || window.navigator.standalone === true;

    if (isInstalled) {
      // Running as installed app — hide everything
      installBtn.classList.add('hidden');
    }

    // Chrome / Edge / Android — beforeinstallprompt
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      // Show our custom install button
      installBtn.classList.remove('hidden');
      installBtn.style.display = 'flex';
      console.log('[PWA] Install prompt ready ✓');
    });

    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) {
        // Fallback: show iOS-style instructions
        iosBanner.classList.add('visible');
        return;
      }
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      console.log('[PWA] Install outcome:', outcome);
      deferredPrompt = null;
      installBtn.classList.add('hidden');
    });

    // Hide install button once installed
    window.addEventListener('appinstalled', () => {
      installBtn.classList.add('hidden');
      iosBanner.classList.remove('visible');
      console.log('[PWA] App installed successfully!');
    });

    // iOS Safari — show manual banner
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
    const hasSeenBanner = sessionStorage.getItem('nexus_pwa_banner_seen');

    if (isIOS && isSafari && !isInstalled && !hasSeenBanner) {
      setTimeout(() => {
        iosBanner.classList.add('visible');
        sessionStorage.setItem('nexus_pwa_banner_seen', '1');
      }, 2000);
    }

    if (iosBannerClose) {
      iosBannerClose.addEventListener('click', () => iosBanner.classList.remove('visible'));
    }

    // ── DEBUG: log PWA installability status after 3s ──────────────────────
    setTimeout(() => {
      console.log('[PWA Debug]', {
        isInstalled,
        hasSW: 'serviceWorker' in navigator,
        isHTTPS: location.protocol === 'https:',
        deferredPromptReady: !!deferredPrompt,
      });
    }, 3000);
  </script>
</body>
</html>
