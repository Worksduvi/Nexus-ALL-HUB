            'fade-in': 'fadeIn 0.3s ease-out',

          keyframes: {
            fadeIn: { from:{opacity:'0',transform:'translateY(-8px)'}, to:{opacity:'1',transform:'translateY(0)'} },

    const callAI = async (settings, prompt) => {
      const {activeAiProvider:p, activeAiModel:m, geminiApiKey, groqApiKey, claudeApiKey, openRouterApiKey} = settings;
      if (p==='gemini' && geminiApiKey) {
        const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${m}:generateContent?key=${geminiApiKey}`,{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})
        });
        const d = await r.json();
        return d.candidates?.[0]?.content?.parts?.[0]?.text || '';
      }
      if (p==='groq' && groqApiKey) {
        const r = await fetch('https://api.groq.com/openai/v1/chat/completions',{
          method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${groqApiKey}`},
          body:JSON.stringify({model:m,messages:[{role:'user',content:prompt}]})
        });
        const d = await r.json();
        return d.choices?.[0]?.message?.content || '';
      }
      if (p==='openrouter' && openRouterApiKey) {
        const r = await fetch('https://openrouter.ai/api/v1/chat/completions',{
          method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${openRouterApiKey}`},
          body:JSON.stringify({model:m,messages:[{role:'user',content:prompt}]})
        });
        const d = await r.json();
        return d.choices?.[0]?.message?.content || '';
      }
      if (p==='claude' && claudeApiKey) {
        const r = await fetch('https://api.anthropic.com/v1/messages',{
          method:'POST',headers:{'Content-Type':'application/json','x-api-key':claudeApiKey,'anthropic-version':'2023-06-01'},
          body:JSON.stringify({model:m,max_tokens:1024,messages:[{role:'user',content:prompt}]})
        });
        const d = await r.json();
        return d.content?.[0]?.text || '';
      }
      throw new Error('No API key configured');

      const [resp, setResp] = useState('');
      const [busy, setBusy] = useState(false);
      const send = async()=>{
        if(!input.trim()) return;
        setBusy(true);
        try{ const r=await callAI(settings,`Be brief. Reply in ${settings.language==='en'?'English':settings.language==='zh'?'Chinese':'Spanish'}: ${input}`); setResp(r); }
        catch(e){ setResp('⚠️ '+e.message); }
        setBusy(false);

        <div className="flex-1 flex gap-4">
          <button onClick={()=>setOpen(true)} className="flex-1 group relative px-6 py-4 bg-slate-900 border border-emerald-500/30 rounded-2xl flex items-center gap-3 transition-all hover:border-emerald-400 active:scale-95 select-none">

              <span className="text-sm font-bold text-white tracking-wide">{t.chatBtn}</span>
              <span className="text-[10px] text-slate-400">{t.chatSubtitle}</span>
            </div>
          </button>
          {open&&(
            <div className="fixed inset-0 z-[100] bg-black/80 backdrop-blur-sm flex items-end sm:items-center justify-center p-4 animate-fade-in">

                <div className="flex gap-2">
                  <input value={input} onChange={e=>setInput(e.target.value)} onKeyPress={e=>e.key==='Enter'&&send()} placeholder={t.chatPlaceholder} className="flex-1 bg-slate-950 border border-slate-700 rounded-full px-4 py-3 text-white focus:border-cyan-500 outline-none text-sm"/>

                </div>
              </div>
            </div>
          )}
        </div>
      );

    // ── NEWS SLIDESHOW ───────────────────────────────────────────────────────
    const NewsSlideshow = ({feeds, settings, t, onHeightChange}) => {
      const [news, setNews] = useState([]);
      const [idx, setIdx] = useState(0);
      const [loading, setLoading] = useState(true);
      const [overlay, setOverlay] = useState(null);
      const [hovering, setHovering] = useState(false);
      const timer = useRef(null);

      useEffect(()=>{
        setLoading(true);
        const enabled = feeds.filter(f=>f.enabled);
        if(!enabled.length){setNews([]);setLoading(false);return;}
        Promise.all(enabled.map(f=>
          fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(f.url)}`)
            .then(r=>r.json()).then(d=>d.status==='ok'?d.items.slice(0,10).map(i=>({
              title:i.title,link:i.link,source:f.name,pubDate:i.pubDate,
              snippet:(i.description||'').replace(/<[^>]*>/g,'').slice(0,250),
              thumb:i.enclosure?.link||i.thumbnail
            })):[]).catch(()=>[])
        )).then(all=>{
          const merged=[].concat(...all).sort((a,b)=>new Date(b.pubDate)-new Date(a.pubDate));
          setNews(merged.slice(0,40));setLoading(false);
        });
      },[feeds]);

      useEffect(()=>{
        if(settings.newsAutoScroll&&news.length&&!hovering&&!overlay){
          timer.current=setInterval(()=>setIdx(p=>(p+1)%news.length),settings.newsSpeed*1000);
        } else clearInterval(timer.current);
        return()=>clearInterval(timer.current);
      },[settings.newsAutoScroll,settings.newsSpeed,news,hovering,overlay]);

      if(!settings.showNews) return null;
      const h = `${4*settings.newsHeightMultiplier}rem`;

      return (
        <div className="w-full bg-slate-900/80 border-y border-slate-700 backdrop-blur-md flex items-center relative overflow-hidden group transition-all"
          style={{height:h}} onMouseEnter={()=>setHovering(true)} onMouseLeave={()=>setHovering(false)}>
          {overlay&&(
            <div className="absolute inset-0 z-50 bg-slate-900/97 p-6 flex flex-col items-center justify-center text-center">
              <button onClick={()=>setOverlay(null)} className="absolute top-4 right-4 p-2 text-slate-400 hover:text-white bg-slate-800 rounded-full"><X size={18}/></button>
              <h3 className="text-lg font-display font-bold text-cyan-400 mb-3">{overlay.title}</h3>
              <div className="text-slate-300 text-sm leading-relaxed max-w-3xl overflow-y-auto max-h-full custom-scrollbar">{overlay.content}</div>
            </div>
          )}
          <div className="absolute right-3 top-1/2 -translate-y-1/2 flex flex-col items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity z-20 bg-slate-800/80 p-1 rounded-full">
            <span className="text-[9px] text-slate-400 font-mono">Size</span>
            <input type="range" min="1" max="6" step="0.5" value={settings.newsHeightMultiplier} onChange={e=>onHeightChange(parseFloat(e.target.value))} className="h-20 w-1 appearance-none rounded-full outline-none accent-cyan-400" style={{writingMode:'vertical-lr',direction:'rtl'}}/>
          </div>
          {loading?(
            <div className="flex items-center gap-2 text-slate-400 animate-pulse mx-auto"><Rss size={16}/><span className="text-sm">{t.loadingNews}</span></div>
          ):news.length?(
            <>
              <button onClick={()=>setIdx(p=>(p-1+news.length)%news.length)} className="absolute left-2 top-1/2 -translate-y-1/2 z-20 p-2 rounded-full bg-slate-800/50 hover:bg-cyan-600/50 text-white opacity-0 group-hover:opacity-100"><ChevronLeft size={18}/></button>
              <div className="w-full h-full flex items-center px-10 md:px-16 gap-6 relative z-10">
                {settings.showNewsImage&&news[idx]?.thumb&&(
                  <div className="hidden md:block h-4/5 aspect-video shrink-0 rounded-lg overflow-hidden border border-white/10 shadow-lg">
                    <img src={news[idx].thumb} alt="" className="w-full h-full object-cover"/>
                  </div>
                )}
                <div className="flex-1 flex flex-col gap-2 min-w-0">
                  <div className="flex items-center gap-2">
                    <button onClick={async()=>{
                      setOverlay({title:'AI Summary',content:t.chatThinking});
                      try{const r=await callAI(settings,`Summarize in ${settings.language==='en'?'English':settings.language==='zh'?'Chinese':'Spanish'}: "${news[idx].title}"`);setOverlay({title:'AI Summary',content:r});}
                      catch(e){setOverlay({title:'Error',content:e.message});}
                    }} className="p-1.5 rounded-full bg-slate-700 hover:bg-green-600 text-white shrink-0"><FileText size={13}/></button>
                    <button onClick={()=>{ if('speechSynthesis' in window){const u=new SpeechSynthesisUtterance(news[idx].title);window.speechSynthesis.speak(u);} }} className="p-1.5 rounded-full bg-slate-700 hover:bg-cyan-600 text-white shrink-0"><Mic size={13}/></button>
                  </div>
                  <a href={news[idx]?.link} target="_blank" rel="noopener noreferrer" className={`font-medium text-white hover:text-cyan-400 transition-colors flex items-start gap-2 ${settings.newsHeightMultiplier>=3?'text-lg':'text-sm'} leading-tight`}>
                    {news[idx]?.title}<ExternalLink size={12} className="opacity-50 shrink-0 mt-0.5"/>
                  </a>
                  <div className="flex items-center gap-2">
                    <span className="text-[10px] font-bold px-1.5 py-0.5 rounded bg-cyan-900 text-cyan-300 uppercase tracking-wider">{news[idx]?.source}</span>
                    <span className="text-[10px] text-slate-400">{news[idx]?.pubDate?new Date(news[idx].pubDate).toLocaleDateString():''}</span>
                  </div>
                  {settings.newsHeightMultiplier>=3&&<p className="text-slate-400 text-xs line-clamp-2">{news[idx]?.snippet}</p>}
                </div>
              </div>
              <button onClick={()=>setIdx(p=>(p+1)%news.length)} className="absolute right-10 top-1/2 -translate-y-1/2 z-20 p-2 rounded-full bg-slate-800/50 hover:bg-cyan-600/50 text-white opacity-0 group-hover:opacity-100"><ChevronRight size={18}/></button>
            </>
          ):<div className="text-slate-500 text-sm mx-auto">{t.noSignal}</div>}
        </div>
      );
    };

    // ── ORGANIZER ────────────────────────────────────────────────────────────

      return (

              <button onClick={()=>setTab('reminders')} className={`p-3 rounded-lg text-left flex items-center gap-3 transition-colors text-sm font-bold ${tab==='reminders'?'bg-cyan-600 text-white':'text-slate-400 hover:bg-slate-800'}`}><Bell size={16}/>{t.reminders}</button>
              <button onClick={()=>setTab('notes')} className={`p-3 rounded-lg text-left flex items-center gap-3 transition-colors text-sm font-bold ${tab==='notes'?'bg-yellow-500 text-black':'text-slate-400 hover:bg-slate-800'}`}><Clock size={16}/>{t.notes}</button>
              <div className="flex-1"/>
              <button onClick={onClose} className="p-3 text-slate-400 hover:text-white flex items-center gap-2 text-sm"><X size={16}/>{t.cancel}</button>
            </div>
            <div className="flex-1 p-6 overflow-y-auto custom-scrollbar">
              {tab==='notes'&&(
                <div>

                    <button onClick={()=>setNotes(p=>[...p,{id:Date.now().toString(),content:'',color:COLS[Math.floor(Math.random()*COLS.length)]}])} className="bg-yellow-500 hover:bg-yellow-400 text-black px-4 py-2 rounded-full font-bold flex items-center gap-2 text-sm"><Plus size={16}/>{t.newNoteBtn}</button>
                  </div>
                  <div className="grid grid-cols-3 gap-4">
                    {notes.map(n=>(
                      <div key={n.id} className={`${n.color} p-3 rounded-lg shadow-lg hover:-translate-y-1 transition-transform relative group h-40 flex flex-col`}>
                        <textarea className="w-full flex-1 bg-transparent resize-none outline-none text-slate-800 text-sm placeholder-slate-600/50" value={n.content} onChange={e=>setNotes(p=>p.map(x=>x.id===n.id?{...x,content:e.target.value}:x))} placeholder={t.writeHere}/>
                        <button onClick={()=>setNotes(p=>p.filter(x=>x.id!==n.id))} className="absolute top-2 right-2 opacity-0 group-hover:opacity-100 text-slate-600 hover:text-red-500"><Trash2 size={14}/></button>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {tab==='reminders'&&(
                <div className="space-y-4">
                  <div className="p-4 rounded-xl border bg-slate-800/50 border-slate-700">
                    <h4 className="text-xs uppercase tracking-wider text-cyan-500 mb-3 font-bold">{t.newReminder}</h4>
                    <div className="flex gap-3 items-end flex-wrap">
                      <div className="flex-1 min-w-[120px]"><label className="text-xs text-slate-500">{t.reminderTitle}</label><input value={rTitle} onChange={e=>setRTitle(e.target.value)} className="w-full bg-transparent border-b border-slate-600 focus:border-cyan-500 outline-none py-1 text-slate-300 text-sm" placeholder={t.reminderTitle}/></div>
                      <div><label className="text-xs text-slate-500">{t.reminderDate}</label><input type="date" value={rDate} onChange={e=>setRDate(e.target.value)} className="bg-transparent border-b border-slate-600 text-slate-300 text-sm py-1"/></div>
                      <div><label className="text-xs text-slate-500">{t.reminderTime}</label><input type="time" value={rTime} onChange={e=>setRTime(e.target.value)} className="bg-transparent border-b border-slate-600 text-slate-300 text-sm py-1"/></div>
                      <button onClick={()=>{if(!rTitle||!rDate||!rTime)return;setRems(p=>[...p,{id:Date.now().toString(),title:rTitle,date:`${rDate}T${rTime}`,completed:false}]);setRTitle('');}} className="bg-cyan-600 hover:bg-cyan-500 p-2 rounded-lg text-white"><Plus size={18}/></button>

                      const past=new Date(r.date)<new Date();

                        <div key={r.id} className={`flex items-center gap-3 p-3 rounded-lg border ${r.completed?'opacity-50':''} bg-slate-900 border-slate-800`}>
                          <button onClick={()=>setRems(p=>p.map(x=>x.id===r.id?{...x,completed:!x.completed}:x))} className={`p-1 rounded-full border ${r.completed?'bg-green-500 border-green-500':'border-slate-500 hover:border-cyan-500'}`}><Check size={12} className={`text-white ${r.completed?'opacity-100':'opacity-0'}`}/></button>

                          {[{code:'es',flag:'🇪🇸',label:'ES'},{code:'en',flag:'🇺🇸',label:'EN'},{code:'zh',flag:'🇨🇳',label:'中'}].map(l=>(

  <script>
    // Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/Nexus-ALL-HUB/sw.js', {scope:'/Nexus-ALL-HUB/'})
          .then(r=>console.log('[SW] OK scope:',r.scope))
          .catch(e=>console.error('[SW] Error:',e));
      });
    }

    // PWA Install
    let deferredPrompt = null;
    const installBtn = document.getElementById('pwa-install-btn');
    const iosBanner  = document.getElementById('pwa-banner');
    const iosBannerClose = document.getElementById('pwa-banner-close');
    const isInstalled = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;

    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.classList.add('show');
      console.log('[PWA] Install prompt ready');
    });

    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) { iosBanner.classList.add('show'); return; }
      deferredPrompt.prompt();
      const {outcome} = await deferredPrompt.userChoice;
      console.log('[PWA] outcome:', outcome);
      deferredPrompt = null;
      installBtn.classList.remove('show');
    });

    window.addEventListener('appinstalled', () => {
      installBtn.classList.remove('show');
      iosBanner.classList.remove('show');
    });

    // iOS Safari banner
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
    if (isIOS && isSafari && !isInstalled && !sessionStorage.getItem('pwa_shown')) {
      setTimeout(() => { iosBanner.classList.add('show'); sessionStorage.setItem('pwa_shown','1'); }, 2500);
    }

    if (iosBannerClose) iosBannerClose.addEventListener('click', () => iosBanner.classList.remove('show'));
  </script>
